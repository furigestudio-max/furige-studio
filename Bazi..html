<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子平八字精準運算系統</title>
    <link rel="icon" href="icon_bazi.png" type="image/png">
    <link rel="apple-touch-icon" href="icon_bazi.png">
    <!-- 引入 Klee One 質感字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --primary-red: #8B0000;
            --wood: #4A773C;
            --fire: #A63D40;
            --earth: #8C7355;
            --metal: #888888;
            --water: #2D5A7E;
        }

        body {
            background-color: #f5f5f7;
            color: #1a1a1a;
            font-family: 'Klee One', 'PingFang TC', 'Microsoft JhengHei', serif;
            line-height: 1.6;
        }

        .bazi-border { border: 2px solid var(--primary-red); }
        .bc { border-color: var(--primary-red) !important; }

        .section-title {
            background-color: var(--primary-red);
            color: white;
            padding: 6px 18px;
            display: inline-block;
            margin-bottom: 1rem;
            border-radius: 2px;
            font-weight: 600;
            letter-spacing: 0.1em;
            font-size: 1.1rem;
        }

        /* 五行顏色 */
        .text-wood { color: var(--wood); }
        .text-fire { color: var(--fire); }
        .text-earth { color: var(--earth); }
        .text-metal { color: var(--metal); }
        .text-water { color: var(--water); }

        /* 確保元素在 PDF 截圖時不換行 */
        .nowrap-center {
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 分析卡片排版 */
        .analysis-card {
            background: white;
            border: 1px solid var(--primary-red);
            padding: 1.25rem;
            box-shadow: 2px 2px 8px rgba(139, 0, 0, 0.08);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .analysis-card h4 {
            color: var(--primary-red);
            font-weight: bold;
            border-bottom: 2px solid var(--primary-red);
            padding-bottom: 6px;
            margin-bottom: 12px;
            font-size: 1.05rem;
            letter-spacing: 0.05em;
        }

        .analysis-card p, .analysis-card ul {
            font-size: 0.9rem;
            color: #333;
            line-height: 1.6;
            margin: 0;
            text-align: justify;
        }

        @media print {
            .no-print { display: none !important; }
            body { background-color: white; }
        }

        input, select {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-red);
        }

        button.primary-btn {
            background-color: var(--primary-red);
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button.primary-btn:hover { background-color: #6b0000; transform: translateY(-1px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- 輸入區塊 -->
        <header class="mb-10 no-print">
            <h1 class="text-4xl font-bold mb-8 text-center" style="color: var(--primary-red); letter-spacing: 0.1em;">子平八字精準運算與深度分析系統</h1>

                <!-- ==================== PDF Page 1: 命盤主圖 ==================== -->

                    <div class="text-center mb-8 border-b-2 bc pb-6 relative">

                    </div>

                    <div class="flex flex-row gap-6 items-start w-full justify-center">
                        <section id="printMainBoard">

                                        <div class="w-[46px] shrink-0 border-l bc flex flex-col font-bold text-gray-800 bg-gray-50/50">

                                            <div class="h-[160px] border-b bc flex justify-center items-center text-base tracking-widest shrink-0">
                                                <div class="flex flex-col items-center"><span>八</span><span>字</span></div>

                                            <div class="h-[100px] border-b bc flex justify-center items-center text-xs tracking-widest shrink-0">

                                        <div class="w-[65px] shrink-0 border-r bc flex flex-col">
                                            <div class="h-[32px] shrink-0 border-b bc flex justify-center items-center text-[11px] font-normal text-gray-600 tracking-widest">農曆</div>
                                            <div class="flex-1 flex justify-center items-center text-[var(--primary-red)] text-xl" id="right-lunar"></div>
                                        </div>
                                        <div class="w-[65px] shrink-0 flex flex-col bg-red-50/40">
                                            <div class="h-[32px] shrink-0 border-b bc flex justify-center items-center text-[11px] font-normal text-gray-700 tracking-widest">姓名</div>
                                            <div class="flex-1 flex justify-center items-center text-2xl tracking-widest" id="right-name"></div>
                                        </div>
                                    </div>

                        </section>
                    </div>
                </div>

                <!-- ==================== PDF Page 2: 專業分析模組 ==================== -->
                <div id="pdfPage2" class="bg-white p-8 shadow-sm border border-gray-100">
                    <div class="text-center mb-8 border-b-2 bc pb-6 relative" id="reportHeader2">
                        <h2 class="text-4xl font-bold text-[var(--primary-red)] tracking-widest">命盤深度分析報告</h2>

        <!-- 網頁底部聲明區塊 -->
        <footer class="mt-16 mb-8 text-center text-gray-500 text-sm space-y-2 no-print border-t border-gray-200 pt-8">

            <p class="text-[var(--primary-red)] font-semibold tracking-wide">提醒：本網站資料皆無存檔，請將命理計算結果自行下載保存。</p>
        </footer>

    </div>

    <script>
        const Gan = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const Zhi = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
        const Zodiac = ["鼠", "牛", "虎", "兔", "龍", "蛇", "馬", "羊", "猴", "雞", "狗", "豬"];
        
        const FiveElements = {
            "甲":"wood", "乙":"wood", "寅":"wood", "卯":"wood",
            "丙":"fire", "丁":"fire", "巳":"fire", "午":"fire",
            "戊":"earth", "己":"earth", "辰":"earth", "戌":"earth", "丑":"earth", "未":"earth",
            "庚":"metal", "辛":"metal", "申":"metal", "酉":"metal",
            "壬":"water", "癸":"water", "亥":"water", "子":"water"
        };

        const hiddenStems = {
            "子":["癸"], "丑":["己","癸","辛"], "寅":["甲","丙","戊"], "卯":["乙"],
            "辰":["戊","乙","癸"], "巳":["丙","戊","庚"], "午":["丁","己"], "未":["己","丁","乙"],
            "申":["庚","壬","戊"], "酉":["辛"], "戌":["戊","辛","丁"], "亥":["壬","甲"]
        };

        const qiStates = ["長生", "沐浴", "冠帶", "臨官", "帝旺", "衰", "病", "死", "墓", "絕", "胎", "養"];
        const qiStarts = {"甲":11, "丙":2, "戊":2, "庚":5, "壬":8, "乙":6, "丁":9, "己":9, "辛":0, "癸":3}; 

        function toFullWidth(str) {
            return str.replace(/[0-9]/g, s => String.fromCharCode(s.charCodeAt(0) + 0xFEE0));
        }

        // 垂直文字轉換核心函式
        function formatVert(str) {
            if (!str) return '';
            return str.split('').map(c => `<span>${c}</span>`).join('');
        }

        function getShenSha(dayGan, branches) {
            const shensha = [];
            const tianyi = { "甲": ["丑", "未"], "戊": ["丑", "未"], "庚": ["丑", "未"], "乙": ["子", "申"], "己": ["子", "申"], "丙": ["亥", "酉"], "丁": ["亥", "酉"], "壬": ["卯", "巳"], "癸": ["卯", "巳"], "辛": ["寅", "午"] };
            const wenyang = { "甲": "巳", "乙": "午", "丙": "申", "丁": "酉", "戊": "申", "己": "酉", "庚": "亥", "辛": "子", "壬": "寅", "癸": "卯" };
            const yangren = { "甲": "卯", "丙": "午", "戊": "午", "庚": "酉", "壬": "子" };
            if (tianyi[dayGan] && branches.some(b => tianyi[dayGan].includes(b))) shensha.push("天乙貴人");
            if (wenyang[dayGan] && branches.includes(wenyang[dayGan])) shensha.push("文昌貴人");
            if (yangren[dayGan] && branches.includes(yangren[dayGan])) shensha.push("羊刃");
            return shensha;
        }

        function getTenGod(dayStem, targetStem) {
            if (!targetStem) return "";
            const dIdx = Gan.indexOf(dayStem); const tIdx = Gan.indexOf(targetStem);
            const dEl = Math.floor(dIdx / 2); const tEl = Math.floor(tIdx / 2);
            const samePol = (dIdx % 2) === (tIdx % 2); const diff = (tEl - dEl + 5) % 5;
            if (diff === 0) return samePol ? "比肩" : "劫財";
            if (diff === 1) return samePol ? "食神" : "傷官";
            if (diff === 2) return samePol ? "偏財" : "正財";
            if (diff === 3) return samePol ? "七殺" : "正官";
            if (diff === 4) return samePol ? "偏印" : "正印";
        }

        function getColor(char) { return FiveElements[char] ? `text-${FiveElements[char]}` : 'text-gray-800'; }
        
        // 修正：同時支援直接傳入英文字串（如 "wood"）以及中文字元（如 "甲"）的五行轉換
        function getElementText(char) { 
            const m = {wood:"木", fire:"火", earth:"土", metal:"金", water:"水"}; 
            return m[char] || m[FiveElements[char]] || ''; 
        }

        function getEoT(dayOfYear) { const B = (360/365)*(dayOfYear-81)*(Math.PI/180); return 9.87*Math.sin(2*B) - 7.53*Math.cos(B) - 1.5*Math.sin(B); }
        
        function getQiState(dayStem, branch) {
            const startZhiIdx = qiStarts[dayStem]; const branchIdx = Zhi.indexOf(branch);
            const isYang = ["甲","丙","戊","庚","壬"].includes(dayStem);
            let steps = isYang ? (branchIdx - startZhiIdx + 12) % 12 : (startZhiIdx - branchIdx + 12) % 12;
            return qiStates[steps];
        }

        function updateLongitude() { const s = document.getElementById('citySelect').value; if(s !== 'custom') document.getElementById('longitude').value = s; }

        function calculateBazi() {
            if (typeof Solar === 'undefined') { alert("曆法庫載入中..."); return; }
            const name = document.getElementById('userName').value || "訪客";
            const gender = document.getElementById('gender').value;
            const dateStr = document.getElementById('birthDate').value;
            const timeStr = document.getElementById('birthTime').value;
            
            if(!dateStr || !timeStr) {
                alert("請完整輸入出生日期與時間。");
                return;
            }
            
            const lon = parseFloat(document.getElementById('longitude').value);
            const birth = new Date(`${dateStr}T${timeStr}`);
            const year = birth.getFullYear();
            const lonDiffMin = (lon - 120.0) * 4;
            const dayOfYear = Math.floor((birth - new Date(year, 0, 0)) / 86400000);
            const tstDate = new Date(birth.getTime() + (lonDiffMin + getEoT(dayOfYear)) * 60000);
            const solar = Solar.fromYmdHms(tstDate.getFullYear(), tstDate.getMonth()+1, tstDate.getDate(), tstDate.getHours(), tstDate.getMinutes(), tstDate.getSeconds());
            const lunar = solar.getLunar();
            const bazi = lunar.getEightChar();
            const p = { yG: bazi.getYearGan(), yZ: bazi.getYearZhi(), mG: bazi.getMonthGan(), mZ: bazi.getMonthZhi(), dG: bazi.getDayGan(), dZ: bazi.getDayZhi(), hG: bazi.getTimeGan(), hZ: bazi.getTimeZhi() };
            const yun = bazi.getYun(gender === 'male' ? 1 : 0);
            const daYuns = yun.getDaYun();
            const sequence = [];
            for(let i=1; i<=9; i++) {
                if (i < daYuns.length) sequence.push({ gz: daYuns[i].getGanZhi(), age: daYuns[i].getStartAge(), year: daYuns[i].getStartYear() });
                else { const last = sequence[sequence.length-1]; sequence.push({ gz: '--', age: last.age + 10, year: last.year + 10 }); }
            }
            const currentYear = new Date().getFullYear();
            let currentDaYun = sequence[0]?.gz || "--";
            sequence.forEach(s => { if(currentYear >= s.year && currentYear < s.year+10) currentDaYun = s.gz; });
            const currentLunarYear = Solar.fromDate(new Date()).getLunar().getYearInGanZhi();
            displayResults({ name, gender, birth, tstDate, year, p, yun, sequence, currentDaYun, currentLunarYear, lon, taiYuan: bazi.getTaiYuan() || "--", mingGong: bazi.getMingGong() || "--", dayXun: bazi.getDayXun(), yearXun: bazi.getYearXun(), dayKong: bazi.getDayXunKong() || "--", yearKong: bazi.getYearXunKong() || "--", shenSha: getShenSha(p.dG, [p.yZ, p.mZ, p.dZ, p.hZ]), lunarStr: `${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}日` });
        }

        function displayResults(d) {
            document.getElementById('resultsArea').classList.remove('hidden');
            document.getElementById('reportTitle').innerText = `${d.name} 之 八字命理深度分析報告`;
            document.getElementById('processSummary').innerText = `真太陽時校準：經度 ${d.lon}°E | 修正時間完成`;
            document.getElementById('page2Name').innerText = `命造：${d.name} | 排盤基準：真太陽時`;
            const yearDigits = toFullWidth((d.year - 1911).toString());
            const verticalYearHtml = `<div class="flex flex-col items-center justify-center leading-[1.0] mt-[-2px]">${yearDigits.split('').map(v => `<span class="block">${v}</span>`).join('')}<span class="block mt-[1px]">年</span></div>`;
            document.getElementById('right-name').innerHTML = `<div class="flex flex-col items-center justify-center font-bold text-[22px] leading-tight">${formatVert(d.name)}</div>`;
            document.getElementById('right-zodiac').innerText = `肖${Zodiac[Zhi.indexOf(d.p.yZ)]}`;
            document.getElementById('right-gender').innerText = (["甲","丙","戊","庚","壬"].includes(d.p.yG)?'陽':'陰') + (d.gender==='male'?'男':'女');
            document.getElementById('right-solar-year').innerText = `公元 ${d.year} 年`;
            document.getElementById('right-roc').innerHTML = verticalYearHtml;
            document.getElementById('right-lunar').innerHTML = verticalYearHtml;
            const sDate = toFullWidth(`${d.tstDate.getMonth()+1}月${d.tstDate.getDate()}日`);

        async function downloadPDF() {
            const page1 = document.getElementById('pdfPage1');
            const page2 = document.getElementById('pdfPage2');
            const downloadBtn = document.getElementById('downloadBtnContainer');
            const header2 = document.getElementById('reportHeader2');
            const userName = document.getElementById('userName').value || "訪客";
            
            downloadBtn.style.display = 'none';
            header2.style.display = 'block';

            try {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('l', 'mm', 'a4'); 
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = pdf.internal.pageSize.getHeight();
                const margin = 10; 
                const maxW = pdfWidth - margin * 2;
                const maxH = pdfHeight - margin * 2;

                const captureOptions = { 
                    scale: 2, 
                    useCORS: true, 
                    backgroundColor: '#ffffff',
                    windowWidth: 1200,
                    letterRendering: true
                };

                const canvas1 = await html2canvas(page1, captureOptions);
                const imgData1 = canvas1.toDataURL('image/jpeg', 1.0);
                
                let finalW1 = maxW;
                let finalH1 = (canvas1.height * maxW) / canvas1.width;
                if (finalH1 > maxH) { finalH1 = maxH; finalW1 = (canvas1.width * maxH) / canvas1.height; }
                
                const x1 = margin + (maxW - finalW1) / 2;
                const y1 = margin + (maxH - finalH1) / 2;
                pdf.addImage(imgData1, 'JPEG', x1, y1, finalW1, finalH1);

                pdf.addPage();
                const canvas2 = await html2canvas(page2, captureOptions);
                const imgData2 = canvas2.toDataURL('image/jpeg', 1.0);
                
                let finalW2 = maxW;
                let finalH2 = (canvas2.height * maxW) / canvas2.width;
                if (finalH2 > maxH) { finalH2 = maxH; finalW2 = (canvas2.width * maxH) / canvas2.height; }
                
                const x2 = margin + (maxW - finalW2) / 2;
                const y2 = margin + (maxH - finalH2) / 2;
                pdf.addImage(imgData2, 'JPEG', x2, y2, finalW2, finalH2);

                pdf.save(`${userName}_八字命理深度分析報告.pdf`);
                
            } catch (err) {
                console.error("PDF 匯出失敗:", err);
                alert("PDF 匯出發生錯誤，請稍後再試。");
            } finally {
                downloadBtn.style.display = 'flex';
                header2.style.display = 'none';
            }
        }
    </script>
